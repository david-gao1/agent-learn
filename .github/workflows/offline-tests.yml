name: Offline Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run MiniClaw tests
        run: python3 -m unittest discover -s prototypes/miniclaw_harness/tests -v

      - name: Run minimal harness tests
        run: python3 -m unittest discover -s prototypes/minimal_harness_agent/tests -v

      - name: Check whitespace
        run: git diff --check
