name: Offline Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run offline verification
        run: scripts/verify_offline.sh
